# .github/workflows/deploy.yml
#
# Деплой Hugo-сайта на VPS
# Триггер: push в ветку main
#
# Необходимые секреты в Settings → Secrets → Actions:
#   VPS_HOST     — IP-адрес вашего VPS
#   VPS_USER     — пользователь SSH (например: ubuntu)
#   VPS_SSH_KEY  — приватный SSH-ключ (содержимое ~/.ssh/deploy_key)

name: Deploy Hugo site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:

      # 1. Получаем код репозитория вместе с темой (submodule)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive   # подтягивает themes/hextra
          fetch-depth: 0          # нужно для корректных дат .Lastmod в Hugo

      # 2. Устанавливаем Python для скрипта конвертации wikilinks
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Конвертируем Obsidian wikilinks → стандартный Markdown
      - name: Convert wikilinks
        run: python convert_wikilinks.py

      # 4. Устанавливаем Hugo Extended
      #    Extended нужен для Hextra (поддержка SCSS)
      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      # 5. Собираем сайт
      #    --minify   — минификация HTML/CSS/JS
      #    --baseURL  — переопределяем baseURL из hugo.yaml для продакшена
      - name: Build site
        run: hugo --minify --baseURL "https://yourdomain.com"

      # 6. Копируем собранный сайт на VPS по SCP
      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "public/"
          target: "/var/www/mysite"
          strip_components: 1     # убирает префикс public/ при копировании

      # 7. Перезагружаем nginx на VPS чтобы подхватить новые файлы
      #    (обычно не нужно для статики, но полезно если меняется конфиг)
      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: sudo systemctl reload nginx
